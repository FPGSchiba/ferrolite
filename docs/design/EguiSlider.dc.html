<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; align-items:center; gap:8px; height:22px; padding:0 4px; user-select:none; font-family:'IBM Plex Sans',system-ui,sans-serif;" onDoubleClick="{{ reset }}" title="{{ label }}">
  <div style="width:74px; flex:0 0 74px; font-size:11px; color:var(--dim,#8c8c8c); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ label }}</div>
  <div ref="{{ trackRef }}" onPointerDown="{{ onDown }}" style="position:relative; flex:1 1 auto; height:18px; display:flex; align-items:center; cursor:ew-resize;">
    <div style="position:absolute; left:0; right:0; top:50%; height:2px; transform:translateY(-50%); background:#3a3a3a; border-radius:1px;"></div>
    <div style="position:absolute; top:50%; height:2px; transform:translateY(-50%); border-radius:1px; left:{{ fillLeftPct }}%; width:{{ fillWidthPct }}%; background:{{ fillColor }};"></div>
    <div style="position:absolute; top:50%; transform:translate(-50%,-50%); left:{{ handlePct }}%; width:11px; height:11px; border-radius:50%; background:{{ handleColor }}; border:1px solid #161616; box-sizing:border-box;"></div>
  </div>
  <div style="width:48px; flex:0 0 48px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:11px; color:{{ valueColor }};">{{ valueText }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){ super(props); this.trackRef = React.createRef(); this.state = { val:null, active:false }; }
  num(v, d){ const n = Number(v); return Number.isFinite(n) ? n : d; }
  bool(v){ return v === true || v === 'true'; }
  min(){ return this.num(this.props.min, 0); }
  max(){ return this.num(this.props.max, 100); }
  def(){ return this.num(this.props.default, 0); }
  getVal(){ return this.state.val == null ? this.num(this.props.value, this.def()) : this.state.val; }
  clamp(v){ return Math.max(this.min(), Math.min(this.max(), v)); }
  setFromX(cx){
    const el = this.trackRef.current; if(!el) return;
    const r = el.getBoundingClientRect();
    let f = (cx - r.left) / r.width; f = Math.max(0, Math.min(1, f));
    const v = this.min() + f * (this.max() - this.min());
    const step = this.num(this.props.step, 0.01);
    const snapped = Math.round(v / step) * step;
    this.setState({ val: this.clamp(snapped) });
  }
  onDown = (e) => {
    e.preventDefault();
    this.setState({ active:true });
    this.setFromX(e.clientX);
    const mv = (ev) => this.setFromX(ev.clientX);
    const up = () => { window.removeEventListener('pointermove', mv); window.removeEventListener('pointerup', up); this.setState({ active:false }); };
    window.addEventListener('pointermove', mv);
    window.addEventListener('pointerup', up);
  };
  reset = () => this.setState({ val: this.def() });
  renderVals(){
    const v = this.getVal(), min = this.min(), max = this.max();
    const frac = (v - min) / (max - min);
    const dec = this.num(this.props.decimals, 2);
    const unit = this.props.unit || '';
    const sign = (this.bool(this.props.signed) && v > 0) ? '+' : '';
    const valueText = sign + v.toFixed(dec) + unit;
    let fillLeft = 0, fillWidth = frac * 100;
    if(this.bool(this.props.bipolar)){
      const zf = (0 - min) / (max - min);
      const a = Math.min(zf, frac), b = Math.max(zf, frac);
      fillLeft = a * 100; fillWidth = (b - a) * 100;
    }
    const active = this.state.active;
    return {
      label: this.props.label || '',
      valueText,
      handlePct: frac * 100,
      fillLeftPct: fillLeft,
      fillWidthPct: fillWidth,
      fillColor: active ? 'var(--accent,#6d97b5)' : '#585858',
      handleColor: active ? '#a9c7dd' : '#9a9a9a',
      valueColor: active ? 'var(--accent,#6d97b5)' : '#bdbdbd',
      trackRef: this.trackRef,
      onDown: this.onDown,
      reset: this.reset,
    };
  }
}
</script>
</body>
</html>
